<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Recursos | MyFriends</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================
     BASE & MOBILE-FIRST
     ============================================ */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; scroll-padding-top: 80px; }
  body {
    font-family: 'Montserrat', sans-serif; font-weight: 400;
    background: #FFFFFF; color: #38383d; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { font-family: 'Clash Display', sans-serif; font-weight: 600; line-height: 1.2; color: #38383d; }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; }

  /* ============================================
     NAVEGAÇÃO (PADRÃO UNIVERSAL)
     ============================================ */
  .nav {
    position: fixed; top: 0; left: 0; right: 0;
    background: #FFFFFF; border-bottom: 1px solid #dee3e5; z-index: 100;
  }
  .nav-inner {
    max-width: 1200px; margin: 0 auto; padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .brand img { height: 44px; width: auto; }
  .nav-links { display: none; gap: 14px; }
  .nav-links a { color: #38383d; font-size: 13px; font-weight: 500; transition: color 0.2s; }
  .nav-links a:hover { color: #d70f15; }

  /* ============================================
     ESTRUTURA GERAL
     ============================================ */
  main { padding-top: 64px; }
  .container { max-width: 1100px; margin: 0 auto; }

  /* ============================================
     HERO DOS RECURSOS
     ============================================ */
  .hero-page { padding: 100px 20px 60px; background-color: #dee3e5; text-align: center; }
  .hero-page h1 { font-size: clamp(38px, 6vw, 68px); max-width: 900px; margin: 0 auto 16px; text-transform: uppercase; letter-spacing: -0.02em; }
  .hero-page p { font-size: clamp(16px, 2vw, 18px); color: #6e7d8c; max-width: 720px; margin: 0 auto; line-height: 1.6; text-wrap: balance; }

  /* ============================================
     EMBED DO AIRTABLE
     ============================================ */
  .airtable-section { padding: 40px 20px 80px; background-color: #ffffff; }
  .airtable-wrap {
    width: 100%;
    height: 800px; /* Altura generosa para navegar pelos recursos */
    border-radius: 12px;
    overflow: hidden;
    background: #FAFAFA;
    border: 1px solid #dee3e5;
  }
  .airtable-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ============================================
     FOOTER (MOBILE: SEM LINKS)
     ============================================ */
  footer { background: #fff; border-top: 1px solid #dee3e5; padding: 48px 20px 24px; }
  .footer-inner { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 32px; align-items: center; }
  .footer-brands { display: flex; flex-direction: column; gap: 20px; align-items: center; }
  .footer-brands img { height: 40px; }
  
  .footer-links { display: none; } 
  .footer-links a { color: #38383d; font-size: 14px; font-weight: 500; transition: color 0.2s; }
  .footer-links a:hover { color: #d70f15; }

  .footer-bottom { 
    max-width: 1100px; margin: 32px auto 0; padding-top: 24px; 
    border-top: 1px solid #dee3e5; display: flex; flex-direction: column; 
    gap: 12px; align-items: center; justify-content: space-between; 
    color: #6e7d8c; font-size: 13px; text-align: center;
  }
  .footer-bottom a { color: #6e7d8c; transition: color 0.2s; text-decoration: none; }
  .footer-bottom a:hover { color: #d70f15; text-decoration: underline; }

  /* ============================================
     TABLET & DESKTOP (≥ 768px)
     ============================================ */
  @media (min-width: 768px) {
    .nav-inner { padding: 12px 32px; }
    .nav-links { display: flex; align-items: center; gap: 28px; }
    main { padding-top: 80px; }
    
    .footer-inner { flex-direction: row; justify-content: space-between; align-items: center; }
    .footer-brands { flex-direction: row; align-items: center; gap: 32px; }
    .footer-links { display: flex; flex-direction: row; gap: 28px; }
    .footer-bottom { flex-direction: row; text-align: left; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand">
      <img src="myfriends-logo.svg" alt="MyFriends" />
    </a>
    <div class="nav-links">
      <a href="index.html#contrastes">Contrastes</a>
      <a href="cristaos.html">Cristãos</a>
      <a href="lideres.html">Líderes</a>
      <a href="#contacto">Contactos</a>
    </div>
  </div>
</nav>

<main>

  <section class="hero-page">
    <div class="container">
      <h1>Biblioteca</h1>
      <p>Explora a nossa base de dados com vídeos, podcasts, artigos e ferramentas desenhadas para te equipar na missão urbana.</p>
    </div>
  </section>

  <section class="airtable-section">
    <div class="container">
      <div class="airtable-wrap">
        <iframe src="https://airtable.com/embed/XXXXXXXXXXXXX?backgroundColor=red&viewControls=on" frameborder="0" onmousewheel="" width="100%" height="100%" style="background: transparent;"></iframe>
      </div>
    </div>
  </section>

</main>

<footer>
  <div class="footer-inner">
    <div class="footer-brands">
      <img src="myfriends-logo.svg" alt="MyFriends" />
      <img src="agape-logo.svg" alt="AGAPE Portugal" style="height: 32px;" />
    </div>
    <div class="footer-links">
      <a href="index.html#contrastes">Contrastes</a>
      <a href="cristaos.html">Cristãos</a>
      <a href="lideres.html">Líderes</a>
      <a href="#contacto">Contactos</a>
    </div>
  </div> 
  <div class="footer-bottom">
    <div>© 2026 MyFriends, AGAPE Portugal</div>
    <a href="https://agape.pt/politica-de-privacidade/" target="_blank" rel="noopener">Política de Privacidade</a>
  </div>
</footer>

</body>
</html>
